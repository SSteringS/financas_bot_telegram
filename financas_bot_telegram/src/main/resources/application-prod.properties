## Carrega o secret do AWS Secrets Manager na inicialização
spring.config.import=aws-secretsmanager:finbot-prod-secrets

# HTTPS na porta 8443 (Telegram suporta 443, 80, 88, 8443)
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=/opt/finbot/keystore.p12
server.ssl.key-store-password=${keystore_password}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=finbot

spring.cloud.aws.region.static=us-east-1

# Datasource — valores injetados do secret (db_host, db_username, db_password)
spring.datasource.url=jdbc:mysql://${db_host}:3306/financas_bot_telegram_db?useSSL=true&serverTimezone=UTC
spring.datasource.username=${db_username}
spring.datasource.password=${db_password}

# JPA — sem DDL automático em produção
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway: prod já tem o schema aplicado. Marcar como baseline V1, sem rodar V1.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Schema inicial consolidado

# Telegram — token injetado do secret (telegram_token)
telegram.bot-token=${telegram_token}
telegram.allowed-user-ids=7436345622

# Auth admin — chave injetada do Secrets Manager
app.admin.api-key=${admin_api_key}
app.frontend.base-url=https://finbot.satyan.com.br
app.cors.allowed-origin=https://finbot.satyan.com.br

# Auth JWT — secret injetado do Secrets Manager
app.jwt.secret=${jwt_secret}
app.jwt.ttl-dias=180
app.cookie.secure=true
app.cookie.domain=finbot.satyan.com.br

# springdoc — desabilitado em produção (não expor API publicamente)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
