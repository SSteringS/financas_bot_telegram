spring.application.name=financas_bot_telegram

spring.datasource.url=jdbc:mysql://localhost:3306/financas_bot_telegram_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=CHANGE_ME
spring.datasource.password=CHANGE_ME
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Configs do bot do Telegram
telegram.api.url=https://api.telegram.org/bot
telegram.api.file.url=https://api.telegram.org/file/bot
# IDs de usu�rio do Telegram autorizados a interagir com o bot
telegram.allowed-user-ids=CHANGE_ME
# Token do Bot do Telegram
telegram.bot-token=CHANGE_ME

# Configs do AWS S3
aws.s3.bucket-name=bot-financas-pagamentos-satyan
aws.s3.region=us-east-1
financasbot.s3.base-url=https://s3.amazonaws.com/bot-financas-pagamentos-satyan/

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Auth admin
app.admin.api-key=CHANGE_ME
app.frontend.base-url=http://localhost:5173

# springdoc-openapi
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.show-actuator=false
