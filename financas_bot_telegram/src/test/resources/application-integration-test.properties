spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.cloud.aws.credentials.access-key=test-key
spring.cloud.aws.credentials.secret-key=test-secret
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.secretsmanager.enabled=false

app.admin.api-key=test-admin-key
app.jwt.secret=test-jwt-secret-pra-integracao-min-32-chars
app.jwt.ttl-dias=1
app.frontend.base-url=http://localhost:5173
app.cors.allowed-origin=http://localhost:5173

telegram.allowed-user-ids=999
telegram.bot-token=test-token
telegram.api.url=http://localhost
telegram.api.file.url=http://localhost

aws.s3.bucket-name=test-bucket
aws.s3.region=us-east-1
financasbot.s3.base-url=http://localhost/
